name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx biome check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc -b
      - run: npx tsc -p convex/tsconfig.json

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # convex/_generated is committed, so codegen is only needed to refresh it.
      # Run it when a deploy key is configured, but best-effort: codegen needs a
      # reachable deployment, so an invalid/expired key or a disabled/paused
      # project must not fail the build — we fall back to the committed
      # convex/_generated files, which is what `npm run build` consumes anyway.
      - name: Convex codegen (best-effort; falls back to committed _generated)
        if: ${{ env.CONVEX_DEPLOY_KEY != '' }}
        run: npx convex codegen || echo "codegen skipped (deployment unreachable) — building from committed convex/_generated"
      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test

  deploy-convex:
    name: Deploy Convex
    runs-on: ubuntu-latest
    # Only deploy on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, build, test]
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy to Convex production
        if: ${{ env.CONVEX_DEPLOY_KEY != '' }}
        run: npx convex deploy

